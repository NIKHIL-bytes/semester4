<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semester 4 Study Material</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --view: #22c55e;
      --download: #3b82f6;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .wrapper {
      max-width: 1400px;
      margin: auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.75);
      padding: 16px 0;
      margin-bottom: 24px;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 4vw, 3rem);
      margin-bottom: 16px;
    }

    .search-box {
      width: 100%;
      max-width: 700px;
      margin: auto;
      display: block;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .subject-section {
      margin-bottom: 35px;
    }

    .subject-title {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      margin-bottom: 16px;
      color: var(--accent);
      padding-left: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 18px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .filename {
      font-size: 0.95rem;
      color: var(--muted);
      word-break: break-word;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 110px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      transition: 0.2s ease;
      color: white;
    }

    .view-btn {
      background: var(--view);
    }

    .download-btn {
      background: var(--download);
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 1.5rem;
      }

      .search-box {
        padding: 12px;
        font-size: 0.95rem;
      }

      .card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <h1>Semester 4 Study Material</h1>
      <input
        type="text"
        class="search-box"
        id="searchInput"
        placeholder="Search by subject or file name..."
      />
    </div>

    <div id="content"></div>
  </div>

  <script>
    const pdfData = {
      CRYPTOGRAPHY: [
        "CIS_Cryptography.pdf",
        "unit-1.pdf",
        "unit-2.pdf",
        "unit-3.pdf",
        "unit-4.pdf",
        "unit-5.pdf"
      ],
      NCS: [
        "unit_1-ncs.pdf",
        "unit_2-ncs.pdf",
        "unit_3-ncs.pdf",
        "unit_4-ncs.pdf",
        "unit_5-ncs.pdf"
      ],
      OS: [
        "unit-1.pdf",
        "unit-2.pdf",
        "unit-3.pdf",
        "unit-4.pdf",
        "unit-5.pdf",
        "unit-6.pdf"
      ],
      PPFD: [
        "ppfd_1.pdf",
        "ppfd_2.pdf",
        "ppfd_3.pdf",
        "ppfd_4.pdf",
        "ppfd_5.pdf"
      ],
      SE: [
        "ch.1-ppt.pdf",
        "ch.2-ppt.pdf",
        "ch.3-ppt.pdf",
        "ch.4-ppt.pdf",
        "ch.5-ppt.pdf",
        "ch.6-ppt.pdf",
        "ch.7-ppt.pdf"
      ]
    };

    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");

    function render(filter = "") {
      content.innerHTML = "";

      Object.entries(pdfData).forEach(([subject, files]) => {
        const filteredFiles = files.filter(file =>
          (subject + " " + file).toLowerCase().includes(filter.toLowerCase())
        );

        if (!filteredFiles.length) return;

        const section = document.createElement("div");
        section.className = "subject-section";

        section.innerHTML = `
          <div class="subject-title">${subject}</div>
          <div class="grid">
            ${filteredFiles.map(file => `
              <div class="card">
                <div class="filename">${file}</div>
                <div class="buttons">
                  <button class="view-btn" onclick="viewPDF('${subject}/${file}')">View</button>
                  <button class="download-btn" onclick="downloadPDF('${subject}/${file}')">Download</button>
                </div>
              </div>
            `).join("")}
          </div>
        `;

        content.appendChild(section);
      });
    }

    function viewPDF(path) {
      window.open(path, "_blank");
    }

    function downloadPDF(path) {
      const a = document.createElement("a");
      a.href = path;
      a.download = path.split("/").pop();
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    searchInput.addEventListener("input", e => {
      render(e.target.value);
    });

    render();
  </script>
</body>
</html>
